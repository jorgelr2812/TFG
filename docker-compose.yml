version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: barberia-db
    restart: always
    environment:
      MYSQL_DATABASE: peluqueria
      MYSQL_ROOT_PASSWORD: Jorge2812$$
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  app:
    build: .
    container_name: barberia-app
    restart: always
    ports:
      - "3000:3000"
    environment:
      - DB_HOST=db
      - DB_USER=root
      - DB_PASSWORD=Jorge2812$$
      - DB_NAME=peluqueria
      - JWT_SECRET=una_clave_muy_segura_para_el_tfg
    depends_on:
      - db

volumes:
  db_data:
