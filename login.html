<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>
<link rel="icon" href="favicon.png">
<link rel="stylesheet" href="Jorge_Lerga_Ruiz_CSS.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<main style="display:flex;justify-content:center;align-items:center;height:100vh;">
    <form id="loginForm" style="background:#fff;padding:30px;border-radius:10px;box-shadow:0 0 10px rgba(0,0,0,0.1);">
        <h2>Iniciar sesión</h2>

        <label>Email</label>
        <input type="email" id="email" required>

        <label>Contraseña</label>
        <input type="password" id="password" required>

        <button type="submit">Entrar</button>
        <p id="error" style="color:red;"></p>
        
        <p style="margin-top:10px;">¿No tienes cuenta? <a href="register.html">Regístrate aquí</a></p>
    </form>
</main>

<script src="supabase.js"></script>
<script src="auth.js"></script>
</body>
</html>
