<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registro</title>
<link rel="stylesheet" href="Jorge_Lerga_Ruiz_CSS.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<main style="display:flex;justify-content:center;align-items:center;height:100vh;">
    
<form id="registerForm" style="background:white;padding:30px;border-radius:10px;box-shadow:0 0 10px rgba(0,0,0,0.1);">

<h2>Crear cuenta</h2>

<label>Email</label>
<input type="email" id="email" required>

<label>Contraseña</label>
<input type="password" id="password" required minlength="6">

<button type="submit">Registrarse</button>

<p id="mensaje" style="margin-top:10px;"></p>

<p>¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a></p>

</form>

</main>

<script src="register.js"></script>

</body>
</html>
